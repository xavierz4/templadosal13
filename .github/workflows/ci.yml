name: 🏗️ CI — Templados AL13 Quality Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    name: Lint + TypeCheck + Tests + Coverage
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Bun Environment
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 📝 Commitlint — Conventional Commits Check
        run: bunx commitlint --from=HEAD~1 --to=HEAD --verbose
        if: github.event_name == 'push'

      - name: 🔍 ESLint — Architecture Rules (REGLA 0 + TypeScript)
        run: bun run lint

      - name: ✏️ Prettier — Format Check
        run: bunx prettier --check .

      - name: 🔨 TypeScript — Type Check (strict)
        run: bunx tsc --noEmit

      - name: 🧪 Vitest — Unit Tests + Coverage (≥80% domain)
        run: bun run test:coverage

      - name: 📊 Upload Coverage Report (Codecov)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
